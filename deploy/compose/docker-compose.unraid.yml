services:
  cosplay-library-stat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosplay-library-stat
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DEFAULT_LOCALE: zh-CN
      DATA_DIR: /data
      LIBRARY_ROOT: /library
      DATABASE_URL: sqlite:////data/cache/library.sqlite3
      THUMBNAIL_SIZE: 420
    volumes:
      - /mnt/user/appdata/cosplay-library-stat:/data
      - /mnt/user/path/to/cosplay_photo_library_v3:/library:ro
